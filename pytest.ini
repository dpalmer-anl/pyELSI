[pytest]
testpaths = tests
norecursedirs = third_party _skbuild build dist .venv
addopts = -ra
markers =
    mpi: tests that must run under mpirun
    slow: opt-in long-running tests
    scaling_benchmark: Hamiltonian-size scaling benchmark (requires PYELSI_RUN_SCALING_BENCH=1)
    sips: tests requiring SLEPc-SIP support (build with -DPYELSI_ENABLE_SIPS=ON)
